@if (totalPages() > 0) {
  <div class="pagination">
    <button type="button" class="pagination__btn" [disabled]="!hasPrev() || disabled()" (click)="goPrev()">
      ← Trước
    </button>
    <span class="pagination__info">
      Trang {{ displayPage() }} / {{ totalPages() }} ({{ totalElements() }} mục)
    </span>
    <button type="button" class="pagination__btn" [disabled]="!hasNext() || disabled()" (click)="goNext()">
      Sau →
    </button>
  </div>
}
