<div class="dashboard-page">
  <header class="dashboard-header">
    <div>
      <h1>Chọn vai trò</h1>
      <p>
        Xin chào, <strong>{{ user()?.name }}</strong> — chọn khu vực làm việc
      </p>
    </div>
    <button type="button" class="btn-logout" (click)="logout()">Đăng xuất</button>
  </header>

  <div class="role-grid">
    @for (item of roles; track item.role) {
      <a
        class="role-card"
        [routerLink]="item.route"
        [style.--role-color]="item.color"
      >
        <span class="role-icon">{{ item.icon }}</span>
        <span class="role-label">{{ item.label }}</span>
      </a>
    }
  </div>
</div>
