spring.application.name=todo
server.port=8080

# Load local secrets from repo-root .env when present (see .env.example)
spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.baseline-on-migrate=true

# JWT (generate with: openssl rand -base64 32)
app.jwt.base64-secret=${JWT_BASE64_SECRET:}
app.jwt.access-token-validity-in-seconds=3600
app.jwt.refresh-token-validity-in-seconds=604800

# User
app.user.default-avatar-url=https://static.vecteezy.com/system/resources/previews/067/213/562/non_2x/simple-male-avatar-icon-flat-design-profile-picture-free-vector.jpg

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder.avatar=pizza-store/avatar
cloudinary.folder.pizza=pizza-store/pizza
cloudinary.folder.category=pizza-store/category
cloudinary.folder.combo=pizza-store/combo

# VNPay Sandbox
app.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
app.vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
app.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay/return}
app.vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/v1/payments/vnpay/ipn}
